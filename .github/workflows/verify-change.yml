name: Build Changed AUR Packages

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: build-changed-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-and-build:
    runs-on: ubuntu-latest
    container:
      image: cachyos/cachyos-v3
    steps:
      - name: Install base dependencies
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm --needed git sudo rsync github-cli fakeroot binutils pacman-contrib paru
          id builder >/dev/null 2>&1 || useradd -m builder
          grep -q '^builder ALL=(ALL) NOPASSWD: ALL$' /etc/sudoers || echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Insert DisableSandboxNetwork into pacman.conf options
        run: |
          set -euo pipefail
          tmp=$(mktemp)
          awk '
            BEGIN { inserted=0 }
            /^\[options\]$/ && !inserted { print; print "DisableSandboxNetwork"; inserted=1; next }
            { print }
            END { if (!inserted) exit 1 }
          ' /etc/pacman.conf > "$tmp"
          cat "$tmp" > /etc/pacman.conf
          rm -f "$tmp"

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fix workspace ownership for build user
        run: chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Detect changed directories
        id: changed-files
        uses: tj-actions/changed-files@v47.0.6
        with:
          dir_names: 'true'
          dir_names_max_depth: '1'
          dir_names_exclude_current_dir: 'true'
          files: |
            */**
            !.github/**

      - name: Filter deleted or invalid packages
        id: changed
        shell: bash
        run: |
          set -euo pipefail

          declare -A seen=()
          changed_dirs=()

          for dir in ${{ steps.changed-files.outputs.all_changed_files }}; do
            [[ -z "$dir" ]] && continue
            [[ "$dir" == ".github" ]] && continue
            
            if [[ ! -d "$dir" ]]; then
              echo "Package directory $dir was fully deleted. Skipping verification."
              continue
            fi
            
            if [[ ! -f "$dir/PKGBUILD" ]]; then
              echo "Directory $dir exists but missing PKGBUILD. Skipping."
              continue
            fi
            
            if [[ -z "${seen[$dir]:-}" ]]; then
              seen[$dir]=1
              changed_dirs+=("$dir")
            fi
          done

          if (( ${#changed_dirs[@]} == 0 )); then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "packages=" >> "$GITHUB_OUTPUT"
            echo "### Build summary" >> "$GITHUB_STEP_SUMMARY"
            echo "- No valid packages to build or verify." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          printf 'packages=%s\n' "${changed_dirs[*]}" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "### Changed packages" >> "$GITHUB_STEP_SUMMARY"
          for pkg in "${changed_dirs[@]}"; do
            echo "- $pkg" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Build changed packages with paru
        if: steps.changed.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -uo pipefail
          read -r -a packages <<< "${{ steps.changed.outputs.packages }}"
          BUILT=()
          FAILED=()

          for dir in "${packages[@]}"; do
            [[ -n "$dir" ]] || continue
            echo "Building $dir with paru"
            if sudo -u builder bash -lc "cd '$GITHUB_WORKSPACE' && paru --noconfirm --skipreview --useask --removemake --nocheck -B '$GITHUB_WORKSPACE/$dir'" >/tmp/build-"$dir".log 2>&1; then
              BUILT+=("$dir")
              echo "Build OK: $dir"
            else
              echo "Build failed for $dir"
              tail -n 120 /tmp/build-"$dir".log || true
              FAILED+=("$dir")
            fi
            sudo -u builder rm -rf "$GITHUB_WORKSPACE/$dir/src" "$GITHUB_WORKSPACE/$dir/pkg"
            pacman -Sy --noconfirm >/dev/null 2>&1 || true
          done

          echo "### Build results" >> "$GITHUB_STEP_SUMMARY"
          echo "- Built OK: ${BUILT[*]:-none}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Failed: ${FAILED[*]:-none}" >> "$GITHUB_STEP_SUMMARY"

          if (( ${#FAILED[@]} > 0 )); then
            echo "::error::Some packages failed to build."
            exit 1
          fi
