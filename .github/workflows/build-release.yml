name: Build and Publish Arch Repository

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'README.md'
      - 'packages.txt'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-repo
  cancel-in-progress: true

env:
  RELEASE_TAG: repository
  REPO_DB_NAME: my-arch-repo

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: cachyos/cachyos-v3
    steps:
      - name: Install base dependencies
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm --needed git sudo rsync github-cli fakeroot binutils pacman-contrib paru
          id builder >/dev/null 2>&1 || useradd -m builder
          grep -q '^builder ALL=(ALL) NOPASSWD: ALL$' /etc/sudoers || echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Insert DisableSandboxNetwork into pacman.conf options
        run: |
          set -euo pipefail
          tmp=$(mktemp)
          awk '
            BEGIN { inserted=0 }
            /^\[options\]$/ && !inserted { print; print "DisableSandboxNetwork"; inserted=1; next }
            { print }
            END { if (!inserted) exit 1 }
          ' /etc/pacman.conf > "$tmp"
          cat "$tmp" > /etc/pacman.conf
          rm -f "$tmp"
          grep -n 'DisableSandboxNetwork' /etc/pacman.conf

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fix workspace ownership for build user
        run: chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build every package directory with paru
        id: build
        run: |
          set -euo pipefail
          mkdir -p output
          BUILT=()
          FAILED=()

          for dir in */ ; do
            dir="${dir%/}"
            case "$dir" in
              .github|output) continue ;;
            esac
            [[ -f "$dir/PKGBUILD" ]] || continue


            echo "=== [$dir] building with paru -B ==="
            if sudo -u builder bash -lc "cd '$GITHUB_WORKSPACE' && paru --noconfirm -B '$GITHUB_WORKSPACE/$dir'" >/tmp/build-"$dir".log 2>&1; then
              find "$dir" -maxdepth 1 -name '*.pkg.tar.zst' -exec cp -f {} output/ \;
              pacman -Sy --noconfirm >/dev/null 2>&1 || true
              BUILT+=("$dir")
              echo "=== [$dir] OK ==="
            else
              echo "::warning::[$dir] build failed"
              tail -n 120 /tmp/build-"$dir".log || true
              FAILED+=("$dir")
            fi
          done

          echo "built=${BUILT[*]}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED[*]}" >> "$GITHUB_OUTPUT"

          echo "### Build summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Built OK: ${BUILT[*]:-none}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Failed: ${FAILED[*]:-none}" >> "$GITHUB_STEP_SUMMARY"

          if [[ ${#BUILT[@]} -eq 0 ]]; then
            echo "::error::No package built successfully, aborting before publish."
            exit 1
          fi

      - name: Generate pacman repo database once
        run: |
          set -euo pipefail
          cd output
          shopt -s nullglob
          pkgs=( *.pkg.tar.zst )
          if (( ${#pkgs[@]} == 0 )); then
            echo "::error::No package artifacts found in output/."
            exit 1
          fi
          rm -f "${REPO_DB_NAME}.db" "${REPO_DB_NAME}.files"                 "${REPO_DB_NAME}.db.tar.gz" "${REPO_DB_NAME}.files.tar.gz"                 "${REPO_DB_NAME}.db.tar.gz.old" "${REPO_DB_NAME}.files.tar.gz.old"
          repo-add "${REPO_DB_NAME}.db.tar.gz" "${pkgs[@]}"
          ls -la

      - name: Publish to fixed GitHub Release (overwrite)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          TAG="${{ env.RELEASE_TAG }}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "=== Release '$TAG' exists, clearing old assets ==="
            gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name'               | while read -r name; do
                  [[ -n "$name" ]] || continue
                  echo "Deleting old asset: $name"
                  gh release delete-asset "$TAG" "$name" --repo "$REPO" -y || true
                done
          else
            echo "=== Creating release '$TAG' ==="
            gh release create "$TAG" --repo "$REPO"               --title "Arch Package Repository"               --notes "Auto-built pacman repository."
          fi

          echo "=== Uploading fresh assets ==="
          gh release upload "$TAG" output/* --repo "$REPO" --clobber

          gh release edit "$TAG" --repo "$REPO"             --notes "Auto-built pacman repository. Last updated: $(date -u '+%Y-%m-%d %H:%M UTC'). Built: ${{ steps.build.outputs.built }}. Failed: ${{ steps.build.outputs.failed }}"
